<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IN-TECH Website</title>
  <!-- Roboto Font 불러오기 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background-color: #003366;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #CCCCCC;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      text-align: center;
    }

    img {
      max-width: 300px;
      margin-bottom: 30px;
    }

    p.message {
      font-size: 24px;
      margin: 10px 0 30px;
    }

    .contact-text {
      font-size: 16px;
      line-height: 1.4; /* 줄간격 좁게 */
      font-weight: 700;
    }

    .contact-text a {
      display: block;
      margin-top: 2px; /* 더 좁은 간격 */
      color: #99E6E6;
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 700;
    }

    .contact-text a:hover {
      color: #FFFFFF;
    }
  </style>
</head>
<body>
  <img src="Logo_white.svg" alt="IN-TECH Logo" />
  <p class="message">Site launching soon</p>

  <div class="contact-text">
    In the meantime, reach us at<br>
    <a href="mailto:david@intechglobal.co.kr">david@intechglobal.co.kr</a>
  </div>
</body>
</html>
